# ─────────────────────────────────────────────────────
#  render.yaml — FarmDirect backend on Render.com
#  Docs: https://render.com/docs/render-yaml-spec
# ─────────────────────────────────────────────────────

services:
  - type: web
    name: farmdirect-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

      # ── Database (set in Render dashboard → Environment) ──
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false

      # ── Auth ──
      - key: JWT_SECRET
        sync: false

      # ── Frontend CORS origin ──
      # Set to your Vercel URL after first deploy
      # e.g. https://farmdirect.vercel.app
      - key: FRONTEND_URL
        sync: false

      # ── Payment gateways ──
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
