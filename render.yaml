services:
  - type: web
    name: farmdirect-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false   # Set this in Render dashboard
      - key: DB_USER
        sync: false   # Set this in Render dashboard
      - key: DB_PASSWORD
        sync: false   # Set this in Render dashboard
      - key: DB_NAME
        sync: false   # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this in Render dashboard
      - key: FRONTEND_URL
        sync: false   # Set this after Vercel deploy (e.g. https://farm-direct.vercel.app)
      - key: STRIPE_SECRET_KEY
        sync: false   # Set this in Render dashboard
      - key: RAZORPAY_KEY_ID
        sync: false   # Set this in Render dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false   # Set this in Render dashboard
